<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Smart Scanner</title>

<style>

body{
margin:0;
background:#000;
color:#00ff88;
font-family:monospace;
text-align:center;
}

video{
width:100%;
height:auto;
}

#popup{

position:fixed;
bottom:-220px;
left:0;
width:100%;
background:#111;
padding:20px;
border-top-left-radius:20px;
border-top-right-radius:20px;
transition:0.35s;

}

#popup.show{
bottom:0;
}

button{
padding:12px;
border:none;
border-radius:10px;
background:#00ff88;
color:#000;
font-size:16px;
margin-top:10px;
}

</style>

</head>

<body>

<h2>QR Scanner</h2>

<video id="camera" autoplay playsinline></video>

<div id="popup">

<div id="textResult"></div>

<button onclick="closePopup()">Close</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

<script>

let video=document.getElementById("camera")
let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")

let scanning=true

navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
}).then(stream=>{
video.srcObject=stream
video.play()
requestAnimationFrame(scanQR)
})

function scanQR(){

if(!scanning){
requestAnimationFrame(scanQR)
return
}

if(video.readyState===video.HAVE_ENOUGH_DATA){

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.drawImage(video,0,0,canvas.width,canvas.height)

let imageData=ctx.getImageData(0,0,canvas.width,canvas.height)

let code=jsQR(imageData.data,canvas.width,canvas.height)

if(code){

scanning=false

handleResult(code.data)

setTimeout(()=>{
scanning=true
},2000)

}

}

requestAnimationFrame(scanQR)

}


function handleResult(data){

data=data.trim()

/* detect links */

let linkPattern=/^(https?:\/\/|www\.|mailto:|tel:)/i

if(linkPattern.test(data)){

if(!data.startsWith("http")){
data="https://"+data
}

window.location.href=data
return

}


/* detect contact */

if(data.includes("BEGIN:VCARD")){

saveContact(data)
return

}


/* otherwise text */

showText(data)

}


function showText(text){

document.getElementById("textResult").innerText=text
document.getElementById("popup").classList.add("show")

}


function closePopup(){

document.getElementById("popup").classList.remove("show")

scanning=true

}


/* SAVE CONTACT */

function saveContact(vcard){

let nameMatch=vcard.match(/FN:(.*)/)
let phoneMatch=vcard.match(/TEL:(.*)/)

let name=nameMatch?nameMatch[1]:"Contact"
let phone=phoneMatch?phoneMatch[1]:""

let link=`contacts:?name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}`

window.location.href=link

}

</script>

</body>
</html>
