<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Smart Scanner</title>

<style>

body{
margin:0;
background:#000;
color:#00ff88;
font-family:monospace;
text-align:center;
}

video{
width:100%;
height:auto;
}

#popup{
position:fixed;
bottom:-220px;
left:0;
width:100%;
background:#111;
padding:20px;
border-top-left-radius:20px;
border-top-right-radius:20px;
transition:0.35s;
}

#popup.show{
bottom:0;
}

button{
padding:12px;
border:none;
border-radius:10px;
background:#00ff88;
color:#000;
font-size:16px;
margin-top:10px;
}

#scanBox{
position:absolute;
top:50%;
left:50%;
width:250px;
height:250px;
border:3px solid #00ff88;
transform:translate(-50%,-50%);
box-shadow:0 0 0 2000px rgba(0,0,0,0.5);
pointer-events:none;
}

</style>

</head>

<body>

<h2>QR Scanner</h2>

<video id="camera" autoplay playsinline></video>

<div id="scanBox"></div>

<button id="flashBtn" onclick="toggleFlash()">Flash ON</button>

<div id="popup">
<div id="textResult"></div>
<button onclick="closePopup()">Close</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

<script>

let video=document.getElementById("camera")
let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")

let scanning=true
let streamTrack=null
let torchOn=false


/* START CAMERA */

navigator.mediaDevices.getUserMedia({
video:{
facingMode:"environment",
width:{ideal:1280},
height:{ideal:720}
}
}).then(stream=>{

video.srcObject=stream
video.play()

streamTrack=stream.getVideoTracks()[0]

/* focus hint */

streamTrack.applyConstraints({
advanced:[
{focusMode:"continuous"}
]
}).catch(()=>{})

requestAnimationFrame(scanQR)

}).catch(err=>{
alert("Camera access failed")
console.log(err)
})


/* FLASHLIGHT */

function toggleFlash(){

if(!streamTrack) return

torchOn=!torchOn

streamTrack.applyConstraints({
advanced:[{torch:torchOn}]
}).then(()=>{

document.getElementById("flashBtn").innerText=
torchOn ? "Flash OFF" : "Flash ON"

}).catch(()=>{
alert("Flash not supported on this device")
})

}


/* SCAN LOOP */

function scanQR(){

if(!scanning){
requestAnimationFrame(scanQR)
return
}

if(video.readyState===video.HAVE_ENOUGH_DATA){

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.drawImage(video,0,0,canvas.width,canvas.height)

/* scan center square */

let size=Math.min(canvas.width,canvas.height)*0.5
let x=(canvas.width-size)/2
let y=(canvas.height-size)/2

let imageData=ctx.getImageData(x,y,size,size)

let code=jsQR(imageData.data,size,size)

if(code){

scanning=false

/* vibration */

if(navigator.vibrate){
navigator.vibrate(200)
}

handleResult(code.data)

setTimeout(()=>{
scanning=true
},2000)

}

}

requestAnimationFrame(scanQR)

}


/* HANDLE RESULTS */

function handleResult(data){

data=data.trim()

/* FIX WHATSAPP LINKS */

if(data.startsWith("wa.me")){
data=data.replace("+","")
data="https://"+data
}

/* FIX DOMAIN LINKS */

let linkPattern=/^(https?:\/\/|www\.|mailto:|tel:|wa\.me|[a-z0-9.-]+\.[a-z]{2,})/i

if(linkPattern.test(data)){

if(!data.startsWith("http") && !data.startsWith("mailto") && !data.startsWith("tel")){
data="https://"+data
}

window.location.href=data
return
}

/* CONTACT */

if(data.includes("BEGIN:VCARD")){
saveContact(data)
return
}

/* TEXT */

showText(data)

}


/* TEXT POPUP */

function showText(text){
document.getElementById("textResult").innerText=text
document.getElementById("popup").classList.add("show")
}

function closePopup(){
document.getElementById("popup").classList.remove("show")
scanning=true
}


/* SAVE CONTACT */

function saveContact(vcard){

let nameMatch=vcard.match(/FN:(.*)/)
let phoneMatch=vcard.match(/TEL:(.*)/)

let name=nameMatch?nameMatch[1]:"Contact"
let phone=phoneMatch?phoneMatch[1]:""

let link=`contacts:?name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}`

window.location.href=link

}

</script>

</body>
</html>
